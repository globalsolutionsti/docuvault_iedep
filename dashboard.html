<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>DocuVault</title>
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

<!-- 🔷 HEADER -->
<header class="topbar">
  <div class="logo">DocuVault</div>

  <div class="top-actions">
    <input type="text" placeholder="Buscar documentos...">
    <span class="icon">🔔</span>
    <span class="icon">⚙️</span>
    <span class="icon" onclick="logout()">❓</span>
  </div>
</header>

<div class="container">

  <!-- 🧭 SIDEBAR -->
  <aside class="sidebar">
    <ul>
      <li class="active">🏠 Inicio</li>
      <li>📄 Mis Documentos</li>
      <li>👥 Compartidos</li>
      <li>⭐ Favoritos</li>
      <li>🕘 Recientes</li>
    </ul>

    <div class="library">
      <h4>Bibliotecas</h4>
      <ul>
        <li class="trash">🗑 Papelera</li>
      </ul>
    </div>
  </aside>

  <!-- 📂 CONTENIDO -->
  <main class="content">

    <div class="toolbar">
      <button class="primary" onclick="openUploadModal()">+ Nuevo / Subir</button>
      <button>Nueva Carpeta</button>
      <button disabled>Compartir</button>
      <button disabled>Descargar</button>
      <button disabled>Renombrar</button>
      <button disabled>Eliminar</button>
      <button disabled>Versiones</button>
      </div>

    <div class="breadcrumb">Inicio</div>

    <div class="files">
      <p>Cargando...</p>
    </div>

  </main>

  <!-- 🧾 PANEL DERECHO -->
  <aside class="right-panel">
    <h4>Actividad reciente</h4>
  </aside>

</div>

<div id="uploadModal" class="modal">
  <div class="modal-content">

    <span class="close" onclick="closeUploadModal()">✖</span>

    <h2>Subir archivo</h2>

    <div id="dropZone" class="drop-zone">
      <p>Arrastra y suelta archivos aquí</p>
      <p>o</p>
      <button onclick="document.getElementById('fileInputHidden').click()">Seleccionar archivo</button>
      <input type="file" id="fileInputHidden" hidden>
    </div>

    <!-- 🔥 ARCHIVO SELECCIONADO -->
    <div id="fileInfo" style="margin-top:15px; display:none;">
      <p><strong>Archivo:</strong> <span id="fileName"></span></p>
    </div>

    <!-- 🔥 BOTONES -->
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeUploadModal()">Cancelar</button>
      <button class="btn-upload" onclick="confirmUpload()">Subir archivo</button>
    </div>

  </div>
</div>

  
<script src="js/config.js"></script>
<script src="js/dashboard.js"></script>
</body>
</html>
